<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBJ Model Debug</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    canvas {
      display: block;
    }

    #info {
      position: fixed;
      top: 12px;
      left: 12px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.6);
      padding: 10px 12px;
      border-radius: 10px;
      z-index: 10;
      white-space: pre-line;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="info">Model yükleniyor...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

    const OBJ_PATH = 'Meshy_AI_Blue_Ice_Tie_Dye_Tank_0416212302_texture.obj';
    const MTL_PATH = 'Meshy_AI_Blue_Ice_Tie_Dye_Tank_0416212302_texture.mtl';

    const info = document.getElementById('info');

    let objTextStats = {
      v: 0,
      vt: 0,
      vn: 0,
      f: 0
    };

    let objLoaderStats = {
      meshCount: 0,
      sizeX: 0,
      sizeY: 0,
      sizeZ: 0
    };

    function updateInfo(extra = '') {
      info.textContent =
        'OBJ text kontrol\n' +
        'v: ' + objTextStats.v + '\n' +
        'vt: ' + objTextStats.vt + '\n' +
        'vn: ' + objTextStats.vn + '\n' +
        'f: ' + objTextStats.f + '\n\n' +
        'OBJLoader sonucu\n' +
        'mesh: ' + objLoaderStats.meshCount + '\n' +
        'boyut: ' +
        objLoaderStats.sizeX.toFixed(2) + ', ' +
        objLoaderStats.sizeY.toFixed(2) + ', ' +
        objLoaderStats.sizeZ.toFixed(2) +
        (extra ? '\n\n' + extra : '');
    }

    fetch(OBJ_PATH)
      .then(r => r.text())
      .then(text => {
        console.log('OBJ ilk 500 karakter:');
        console.log(text.slice(0, 500));

        const lines = text.split('\n');
        objTextStats.v = lines.filter(line => line.startsWith('v ')).length;
        objTextStats.vt = lines.filter(line => line.startsWith('vt ')).length;
        objTextStats.vn = lines.filter(line => line.startsWith('vn ')).length;
        objTextStats.f = lines.filter(line => line.startsWith('f ')).length;

        console.log('OBJ vertex:', objTextStats.v);
        console.log('OBJ uv:', objTextStats.vt);
        console.log('OBJ normal:', objTextStats.vn);
        console.log('OBJ face:', objTextStats.f);

        updateInfo('OBJ text okundu');
      })
      .catch(err => {
        console.error('OBJ text okunamadı:', err);
        updateInfo('OBJ text okunamadı');
      });

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.001,
      10000
    );
    camera.position.set(0, 1, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 2));

    const light1 = new THREE.DirectionalLight(0xffffff, 2);
    light1.position.set(5, 5, 5);
    scene.add(light1);

    const light2 = new THREE.DirectionalLight(0xffffff, 1.2);
    light2.position.set(-5, 3, -5);
    scene.add(light2);

    scene.add(new THREE.GridHelper(10, 10));
    scene.add(new THREE.AxesHelper(3));

    function fitCameraToObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));

      cameraZ *= 1.8;

      camera.position.set(center.x, center.y + maxDim * 0.2, center.z + cameraZ);
      camera.near = Math.max(0.001, maxDim / 1000);
      camera.far = Math.max(10000, maxDim * 20);
      camera.updateProjectionMatrix();

      controls.target.copy(center);
      controls.update();

      return { box, size, center, maxDim };
    }

    const mtlLoader = new MTLLoader();

    mtlLoader.load(
      MTL_PATH,
      (materials) => {
        materials.preload();

        const objLoader = new OBJLoader();
        objLoader.setMaterials(materials);

        objLoader.load(
          OBJ_PATH,
          (object) => {
            let meshCount = 0;

            object.traverse((child) => {
              if (child.isMesh) {
                meshCount++;
                child.geometry.computeVertexNormals();
                child.material = new THREE.MeshNormalMaterial({
                  side: THREE.DoubleSide,
                  wireframe: false
                });
              }
            });

            const firstBox = new THREE.Box3().setFromObject(object);
            const firstCenter = firstBox.getCenter(new THREE.Vector3());
            object.position.sub(firstCenter);

            object.scale.setScalar(5);
            object.rotation.x = -Math.PI / 2;

            scene.add(object);

            const result = fitCameraToObject(object);
            const helper = new THREE.Box3Helper(result.box, 0xff0000);
            scene.add(helper);

            objLoaderStats.meshCount = meshCount;
            objLoaderStats.sizeX = result.size.x;
            objLoaderStats.sizeY = result.size.y;
            objLoaderStats.sizeZ = result.size.z;

            console.log('mesh count:', meshCount);
            console.log('size:', result.size);
            console.log('center:', result.center);
            console.log('maxDim:', result.maxDim);

            updateInfo('Model yüklendi');
          },
          (xhr) => {
            if (xhr.total) {
              const p = ((xhr.loaded / xhr.total) * 100).toFixed(0);
              updateInfo('Model yükleniyor... %' + p);
            } else {
              updateInfo('Model yükleniyor...');
            }
          },
          (error) => {
            console.error('OBJ yükleme hatası:', error);
            updateInfo('OBJ yükleme hatası');
          }
        );
      },
      undefined,
      (error) => {
        console.error('MTL yükleme hatası:', error);
        updateInfo('MTL yükleme hatası');
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
