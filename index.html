<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBJ Model</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    canvas {
      display: block;
    }

    #info {
      position: fixed;
      top: 12px;
      left: 12px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.55);
      padding: 8px 12px;
      border-radius: 8px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="info">Model yükleniyor...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

    const OBJ_PATH = 'Meshy_AI_Blue_Ice_Tie_Dye_Tank_0416212302_texture.obj';
    const MTL_PATH = 'Meshy_AI_Blue_Ice_Tie_Dye_Tank_0416212302_texture.mtl';

    const info = document.getElementById('info');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.01,
      2000
    );
    camera.position.set(0, 0, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 1.4));

    const light1 = new THREE.DirectionalLight(0xffffff, 1.8);
    light1.position.set(3, 4, 5);
    scene.add(light1);

    const light2 = new THREE.DirectionalLight(0xffffff, 1.0);
    light2.position.set(-3, 2, -4);
    scene.add(light2);

    const light3 = new THREE.DirectionalLight(0xffffff, 0.8);
    light3.position.set(0, -2, 3);
    scene.add(light3);

    scene.add(new THREE.GridHelper(10, 10));
    scene.add(new THREE.AxesHelper(2));

    const mtlLoader = new MTLLoader();

    mtlLoader.load(
      MTL_PATH,
      (materials) => {
        materials.preload();

        const objLoader = new OBJLoader();
        objLoader.setMaterials(materials);

        objLoader.load(
          OBJ_PATH,
          (object) => {
            const originalBox = new THREE.Box3().setFromObject(object);
            const originalSize = originalBox.getSize(new THREE.Vector3());
            const originalCenter = originalBox.getCenter(new THREE.Vector3());

            object.position.sub(originalCenter);

            const maxDim = Math.max(originalSize.x, originalSize.y, originalSize.z);

            if (maxDim > 0) {
              const scale = 2 / maxDim;
              object.scale.setScalar(scale);
            }

            // Gerekirse yön testi için aç:
            // object.rotation.x = -Math.PI / 2;

            object.traverse((child) => {
              if (child.isMesh) {
                child.material = new THREE.MeshNormalMaterial({
                  side: THREE.DoubleSide
                });
                child.geometry.computeVertexNormals();
              }
            });

            scene.add(object);

            const finalBox = new THREE.Box3().setFromObject(object);
            const finalSize = finalBox.getSize(new THREE.Vector3());
            const finalCenter = finalBox.getCenter(new THREE.Vector3());

            object.position.sub(finalCenter);

            const finalMaxDim = Math.max(finalSize.x, finalSize.y, finalSize.z);

            camera.position.set(0, finalMaxDim * 0.3, Math.max(finalMaxDim * 2.2, 3));
            camera.lookAt(0, 0, 0);
            camera.updateProjectionMatrix();

            controls.target.set(0, 0, 0);
            controls.update();

            console.log('Model yüklendi');
            console.log('Boyut:', finalSize);
            console.log('Merkez:', finalCenter);

            info.textContent = 'Model yüklendi';
          },
          (xhr) => {
            if (xhr.total) {
              const percent = ((xhr.loaded / xhr.total) * 100).toFixed(0);
              info.textContent = `Model yükleniyor... %${percent}`;
            } else {
              info.textContent = 'Model yükleniyor...';
            }
          },
          (error) => {
            console.error('OBJ yükleme hatası:', error);
            info.textContent = 'OBJ yükleme hatası';
          }
        );
      },
      undefined,
      (error) => {
        console.error('MTL yükleme hatası:', error);
        info.textContent = 'MTL yükleme hatası';
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
