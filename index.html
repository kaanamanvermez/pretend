<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLB Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
    }
    canvas { display: block; }
    #info {
      position: fixed;
      top: 12px;
      left: 12px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.6);
      padding: 10px 12px;
      border-radius: 10px;
      z-index: 10;
      white-space: pre-line;
      line-height: 1.4;
      max-width: 90vw;
    }
  </style>
</head>
<body>
  <div id="info">GLB yükleniyor...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const GLB_PATH = './Meshy_AI_Blue_Ice_Tie_Dye_Tank_0420161921_texture.glb';

    const info = document.getElementById('info');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.001, 10000);
    camera.position.set(0, 1, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 2));

    const light1 = new THREE.DirectionalLight(0xffffff, 2);
    light1.position.set(5, 5, 5);
    scene.add(light1);

    const light2 = new THREE.DirectionalLight(0xffffff, 1.2);
    light2.position.set(-5, 3, -5);
    scene.add(light2);

    scene.add(new THREE.GridHelper(10, 10));
    scene.add(new THREE.AxesHelper(3));

    function fitCameraToObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);

      if (maxDim <= 0) {
        return { box, size, center, maxDim };
      }

      const fov = camera.fov * (Math.PI / 180);
      let cameraZ = Math.abs((maxDim / 2) / Math.tan(fov / 2));
      cameraZ *= 1.8;

      camera.position.set(
        center.x,
        center.y + maxDim * 0.2,
        center.z + Math.max(cameraZ, 3)
      );

      camera.near = Math.max(0.001, maxDim / 1000);
      camera.far = Math.max(10000, maxDim * 20);
      camera.updateProjectionMatrix();

      controls.target.copy(center);
      controls.update();

      return { box, size, center, maxDim };
    }

    async function start() {
      try {
        info.textContent = 'GLB dosyası kontrol ediliyor...';

        const response = await fetch(GLB_PATH);

        if (!response.ok) {
          throw new Error('Dosya bulunamadı. HTTP: ' + response.status);
        }

        const buffer = await response.arrayBuffer();
        console.log('GLB byte length:', buffer.byteLength);

        if (buffer.byteLength < 100) {
          throw new Error('GLB dosyası çok küçük veya bozuk görünüyor.');
        }

        info.textContent = 'GLB bulundu, parse ediliyor...';

        const loader = new GLTFLoader();
        loader.parse(
          buffer,
          '',
          (gltf) => {
            const model = gltf.scene;
            let meshCount = 0;

            model.traverse((child) => {
              if (child.isMesh) {
                meshCount++;
                child.castShadow = true;
                child.receiveShadow = true;

                if (child.material) {
                  child.material.side = THREE.DoubleSide;
                } else {
                  child.material = new THREE.MeshNormalMaterial({ side: THREE.DoubleSide });
                }
              }
            });

            scene.add(model);

            const result = fitCameraToObject(model);
            scene.add(new THREE.Box3Helper(result.box, 0xff0000));

            console.log('mesh:', meshCount);
            console.log('size:', result.size);
            console.log('animations:', gltf.animations.length);

            info.textContent =
              'GLB yüklendi\n' +
              'mesh: ' + meshCount + '\n' +
              'boyut: ' +
              result.size.x.toFixed(2) + ', ' +
              result.size.y.toFixed(2) + ', ' +
              result.size.z.toFixed(2);

            if (meshCount === 0) {
              info.textContent += '\nUYARI: model içinde mesh yok';
            }
          },
          (error) => {
            console.error('GLB parse hatası:', error);
            info.textContent = 'GLB parse hatası:\n' + (error?.message || error);
          }
        );
      } catch (error) {
        console.error('GLB yükleme hatası:', error);
        info.textContent = 'GLB yükleme hatası:\n' + (error?.message || error);
      }
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
    start();
  </script>
</body>
</html>
